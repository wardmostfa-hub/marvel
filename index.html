<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>متصفح البوت</title>
  <link rel="stylesheet" href="webapp.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>متصفح البوت</h1>
      <p id="subtitle">تحميل البيانات...</p>
    </div>
    <button id="refreshBtn" class="ghost-btn" type="button">تحديث</button>
  </header>

  <main>
    <section id="statusBox" class="status hidden"></section>

    <section>
      <h2 class="section-title">الأقسام</h2>
      <div id="categories" class="grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">الخدمات</h2>
        <span id="activeCategoryBadge" class="badge hidden"></span>
      </div>
      <div id="products" class="cards"></div>
    </section>
  </main>

  <template id="categoryTpl">
    <button type="button" class="category-btn"></button>
  </template>

  <template id="productTpl">
    <article class="card">
      <img class="thumb" alt="" loading="lazy" />
      <div class="content">
        <h3 class="name"></h3>
        <p class="meta"></p>
        <div class="actions">
          <button type="button" class="buy-btn">شراء</button>
        </div>
      </div>
    </article>
  </template>

  <script src="webapp.js"></script>
</body>
</html>
